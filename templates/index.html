<!DOCTYPE html>
<html>
<head>
    <title>ConceptClarity</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Scientific Term Explainer</h1>

    <div class="input-section">

        <input
            type="text"
            id="termInput"
            placeholder="Enter scientific term"
        >

        <select id="langSelect">

            <option value="English">English</option>
            <option value="Kannada">Kannada</option>
            <option value="Bengali">Bengali</option>
            <option value="Hindi">Hindi</option>
            <option value="Marathi">Marathi</option>
            <option value="Tamil">Tamil</option>
            <option value="French">French</option>
            <option value="German">German</option>
            <option value="Spanish">Spanish</option>
            <option value="Japanese">Japanese</option>
            <option value="Chinese">Chinese</option>
            <option value="Arabic">Arabic</option>
            <option value="Russian">Russian</option>
            <option value="Korean">Korean</option>
            <option value="Italian">Italian</option>
            <option value="Portuguese">Portuguese</option>
            <option value="Turkish">Turkish</option>

        </select>

        <button onclick="getExplanation()">
            Explain
        </button>

    </div>

    <div id="resultSection"></div>

</div>

<script>

function formatJSON(obj) {
    return JSON.stringify(obj, null, 2);
}


// ---------------- EXPLAIN ----------------
async function getExplanation() {

    const term = document.getElementById("termInput").value.trim();
    const lang = document.getElementById("langSelect").value;
    const resultDiv = document.getElementById("resultSection");

    if (!term) {
        resultDiv.innerHTML = "<p>Please enter a term.</p>";
        return;
    }

    resultDiv.innerHTML = "Loading...";

    try {

        const response = await fetch("/api/explain", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                term: term,
                lang: lang
            })
        });

        const data = await response.json();

        if (data.error) {
            resultDiv.innerHTML = data.error;
            return;
        }

        resultDiv.innerHTML = `
            <div class="result">

                <h2>${data.term}</h2>

                <p>${data.explanation}</p>

                <h3>Real World Example</h3>
                <p>${data.example}</p>

                <h3>Related Terms</h3>

                <div class="related-terms">
                    ${data.related_terms.map(t =>
                        `<button onclick="searchRelated('${t}')">${t}</button>`
                    ).join("")}
                </div>

            </div>

            <div class="json-box">

                <h3>JSON Response</h3>

                <pre>
${formatJSON(data)}
                </pre>

            </div>
        `;

    } catch (error) {

        resultDiv.innerHTML =
            "Error generating explanation.";

    }
}


// ---------------- RELATED ----------------

function searchRelated(term) {

    document.getElementById("termInput").value = term;

    getExplanation();
}

</script>

</body>
</html>
